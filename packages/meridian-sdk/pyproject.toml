[project]
name = "meridian-sdk"
version = "0.1.0"
description = "Meridian SDK — Instrument ML models for observability, explainability, and compliance"
readme = "README.md"
license = { text = "Proprietary" }
requires-python = ">=3.12"
authors = [
    { name = "Matroide", email = "engineering@matroide.com" },
]
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.9",
]

[project.optional-dependencies]
sklearn = ["scikit-learn>=1.5"]
pytorch = ["torch>=2.0"]
tensorflow = ["tensorflow>=2.12"]
xgboost = ["xgboost>=1.7"]
huggingface = ["transformers>=4.30"]

[project.scripts]
meridian = "meridian_sdk.cli.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/meridian_sdk"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
