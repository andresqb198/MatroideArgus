name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install SDK
        working-directory: sdk
        run: pip install -e ".[dev]"
      - name: Lint
        working-directory: sdk
        run: ruff check src/ tests/
      - name: Type check
        working-directory: sdk
        run: mypy src/meridian_sdk/ --ignore-missing-imports
      - name: Test
        working-directory: sdk
        run: pytest --cov=meridian_sdk --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: sdk/coverage.xml
          flags: sdk

  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: meridian
          POSTGRES_PASSWORD: meridian
          POSTGRES_DB: meridian
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Lint
        working-directory: backend
        run: ruff check app/ tests/
      - name: Test
        working-directory: backend
        run: pytest --cov=app --cov-report=xml
        env:
          MERIDIAN_DATABASE_URL: postgresql+asyncpg://meridian:meridian@localhost:5432/meridian
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
